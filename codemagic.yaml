# Codemagic CI — Tauri v2 iOS "does it even build?" smoke (UNSIGNED simulator build).
#
# Goal: prove the free macOS tier can COMPILE our Tauri iOS app (Rust core -> aarch64
# simulator + Swift shell) WITHOUT an Apple Developer account ($99). Simulator builds
# need no code signing, so this validates the whole no-Mac toolchain for free.
# If this goes green -> next step is $99 Apple + signing + TestFlight to get it on a real iPhone.
#
# iOS commands only run on macOS — Codemagic provides it.
workflows:
  ios-smoke:
    name: iOS simulator smoke (unsigned)
    instance_type: mac_mini_m2 # Codemagic free tier (500 build min/mo)
    max_build_duration: 60
    environment:
      xcode: latest
      node: 24 # package.json engines: node >=24
    scripts:
      - name: Install Rust + iOS targets
        script: |
          if ! command -v rustup >/dev/null 2>&1; then
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          fi
          source "$HOME/.cargo/env"
          rustup target add aarch64-apple-ios x86_64-apple-ios aarch64-apple-ios-sim
      - name: Put Node + Rust on PATH (Codemagic uses `n`, not nvm)
        script: |
          # The previous run failed with `npm: command not found`: Codemagic activates
          # Node via `n` during machine prep, but that node is NOT on PATH in plain
          # script-step shells (Apple Silicon prefix differs). Diagnose where it lives,
          # re-activate via `n`, then symlink the real binaries into /usr/local/bin so
          # every later step AND Tauri's Rust build phase (run inside Xcode) find them.
          echo "PATH=$PATH"
          echo "n=$(command -v n) node=$(command -v node) npm=$(command -v npm) npx=$(command -v npx)"
          # Best-effort activation — the real gates are `npm ci` / the build below, which
          # fail loudly if Node still is not resolvable.
          command -v n >/dev/null 2>&1 && n 24 || true
          source "$HOME/.cargo/env"
          for bin in node npm npx cargo rustc; do
            p="$(command -v "$bin" 2>/dev/null || true)"
            if [ -n "$p" ]; then
              sudo ln -sf "$p" "/usr/local/bin/$bin"
              echo "linked $bin -> $p"
            else
              echo "MISSING: $bin"
            fi
          done
          ls -la /usr/local/bin/node /usr/local/bin/npm 2>/dev/null || true
      - name: Install JS deps
        script: |
          export PATH="/usr/local/bin:$PATH"
          npm ci
      - name: Init iOS target
        script: |
          export PATH="/usr/local/bin:$PATH"
          source "$HOME/.cargo/env"
          npx tauri ios init --ci --verbose
      - name: Build iOS app for the simulator (unsigned)
        script: |
          export PATH="/usr/local/bin:$PATH"
          source "$HOME/.cargo/env"
          npx tauri ios build --target aarch64-sim --debug --ci --verbose
    artifacts:
      - build/**/*.app
      - src-tauri/gen/apple/**/*.app
      - src-tauri/gen/apple/build/**/*.log
