# Codemagic CI — Tauri v2 iOS "does it even build?" smoke (UNSIGNED simulator build).
#
# Goal: prove the free macOS tier can COMPILE our Tauri iOS app (Rust core -> aarch64
# simulator + Swift shell) WITHOUT an Apple Developer account ($99). Simulator builds
# need no code signing, so this validates the whole no-Mac toolchain for free.
# If this goes green -> next step is $99 Apple + signing + TestFlight to get it on a real iPhone.
#
# iOS commands only run on macOS — Codemagic provides it.
workflows:
  ios-smoke:
    name: iOS simulator smoke (unsigned)
    instance_type: mac_mini_m2 # Codemagic free tier (500 build min/mo)
    max_build_duration: 60
    environment:
      xcode: latest
      node: 24 # package.json engines: node >=24
    scripts:
      - name: Install Rust + iOS targets
        script: |
          if ! command -v rustup >/dev/null 2>&1; then
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          fi
          source "$HOME/.cargo/env"
          rustup target add aarch64-apple-ios x86_64-apple-ios aarch64-apple-ios-sim
      - name: Put Rust on PATH for the Xcode build phase (Node is already on /usr/local/bin)
        script: |
          # Root cause of the earlier `npm: command not found`: Codemagic's `n` already
          # places node/npm/npx in /usr/local/bin (which is on PATH), so symlinking them
          # onto themselves (`ln -sf /usr/local/bin/node /usr/local/bin/node`) created a
          # self-referential ELOOP and broke npm. Fix: only symlink a binary when it is
          # NOT already at the target. node/npm/npx are left untouched; cargo/rustc (in
          # ~/.cargo/bin, off PATH) get linked so Tauri's Rust build phase inside Xcode
          # can find them.
          source "$HOME/.cargo/env"
          echo "PATH=$PATH"
          for bin in node npm npx cargo rustc; do
            p="$(command -v "$bin" 2>/dev/null || true)"
            if [ -z "$p" ]; then
              echo "MISSING: $bin"
            elif [ "$p" = "/usr/local/bin/$bin" ]; then
              echo "$bin already on PATH at $p (no symlink needed)"
            else
              sudo ln -sf "$p" "/usr/local/bin/$bin"
              echo "linked $bin -> $p"
            fi
          done
          node --version && npm --version && cargo --version
      - name: Install JS deps
        script: |
          export PATH="/usr/local/bin:$PATH"
          npm ci
      - name: Init iOS target
        script: |
          export PATH="/usr/local/bin:$PATH"
          source "$HOME/.cargo/env"
          npx tauri ios init --ci --verbose
      - name: Build iOS app for the simulator (unsigned)
        script: |
          export PATH="/usr/local/bin:$PATH"
          source "$HOME/.cargo/env"
          npx tauri ios build --target aarch64-sim --debug --ci --verbose
    artifacts:
      - build/**/*.app
      - src-tauri/gen/apple/**/*.app
      - src-tauri/gen/apple/build/**/*.log
