name: CI

# CI on pull requests. The frontend job runs format:check, ESLint, the
# typecheck+build, vitest, and `npm audit --omit=dev`; the rust job runs
# cargo fmt --check, clippy (-D warnings), and cargo test.
#
# NOTE: these jobs report pass/fail but are ADVISORY for now — branch protection
# / required status checks are unavailable on this repo's current plan (private
# repo without GitHub Pro/Team; the API returns 403, the same constraint noted
# in codeql.yml). Once the repo is public or the org upgrades, mark the
# "Frontend (lint, typecheck, test)" and "Rust (fmt, clippy, test)" checks as
# required in branch protection so a red run actually blocks merges. See #118.
on:
  pull_request:
  push:
    branches: [main]

# Cancel superseded runs on the same ref (e.g. successive pushes to a PR).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  frontend:
    name: Frontend (lint, typecheck, test)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        run: npm run format:check

      - name: Lint
        run: npm run lint

      # `npm run build` = `tsc && vite build` — doubles as the typecheck gate.
      - name: Typecheck and build
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Audit production dependencies
        run: npm audit --omit=dev

  rust:
    name: Rust (fmt, clippy, test)
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      # Cheap, source-only gate — runs before the apt install + compile so a
      # formatting miss fails fast without paying for the toolchain build.
      - name: Rust format check
        run: cargo fmt --manifest-path src-tauri/Cargo.toml --check

      - name: Install Linux system dependencies
        # apt-get occasionally hangs on a slow Azure mirror (a ~14-min stall on the
        # update step blocked the Rust gate on PR #145, #146). Retry update+install
        # up to 3x with a per-attempt timeout so a hung mirror is killed and retried
        # rather than stalling the whole job. The `if` keeps this safe under set -e.
        run: |
          for attempt in 1 2 3; do
            if timeout 200 sudo apt-get update && timeout 300 sudo apt-get install -y \
              libwebkit2gtk-4.1-dev \
              libappindicator3-dev \
              librsvg2-dev \
              libdbus-1-dev \
              patchelf; then
              exit 0
            fi
            echo "::warning::apt attempt $attempt failed or timed out; retrying in 15s"
            sleep 15
          done
          exit 1

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # tauri::generate_context!() embeds frontendDist (../dist) at compile time,
      # so the frontend must be built before the Rust crate will compile.
      - name: Build frontend (provides dist/ for generate_context!)
        run: |
          npm ci
          npm run build

      # clippy compiles the crate (and tests/examples via --all-targets), so it
      # needs dist/ from the step above.
      - name: Clippy (deny warnings)
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets -- -D warnings

      - name: Run Rust tests
        run: cargo test --manifest-path src-tauri/Cargo.toml
