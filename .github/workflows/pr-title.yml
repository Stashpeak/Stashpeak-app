name: PR title

# Enforce Conventional-Commit PR titles so history stays consistent and the
# squash-merge subject line is well-formed. Complements pr-quality-gate.yml,
# which checks the PR *body* (issue link + test plan). Ported from the sibling
# SimLauncher repo. Dependabot PRs are kept passing via the "chore" commit
# prefix configured in dependabot.yml (not an exemption here).
on:
  pull_request_target:
    types:
      - opened
      - edited
      - reopened
      - synchronize

# Only the latest event per PR needs to run; cancel superseded runs.
concurrency:
  group: pr-title-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

# Read-only, and safe under pull_request_target: this job only reads the PR title
# via the API — it never checks out or runs the PR's code with this token.
permissions:
  pull-requests: read

jobs:
  lint:
    name: Validate PR title
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR title
        uses: amannn/action-semantic-pull-request@e32d7e603df1aa1ba07e981f2a23455dee596825 # v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Kept in sync with the prefixes used across this repo's history.
          types: |
            feat
            fix
            docs
            style
            refactor
            perf
            test
            build
            ci
            chore
            revert
            a11y
            visual
            security
            reliability
