name: PR Quality Gate

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions:
  contents: read
  pull-requests: read

jobs:
  validate-pr-body:
    # Dependabot version-bump PRs carry no issue link or test plan (and rewrite
    # their body on every rebase, so a "Closes" comment can't satisfy this), so
    # exempt them — the job is skipped rather than failed for those PRs.
    if: ${{ github.event.pull_request.user.login != 'dependabot[bot]' }}
    runs-on: ubuntu-latest
    steps:
      - name: Enforce issue linkage and test plan
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.pull_request.body || "";

            const hasIssueLink = /(close[sd]?|fix(e[sd])?|resolve[sd]?)\s+#\d+/i.test(body);
            const hasTestPlanSection = /##\s*Test\s*plan/i.test(body);

            if (!hasIssueLink || !hasTestPlanSection) {
              const missing = [];
              if (!hasIssueLink) missing.push("closing keyword + issue reference (e.g. `Closes #123`)");
              if (!hasTestPlanSection) missing.push("`## Test plan` section");
              core.setFailed(`PR description is missing: ${missing.join(", ")}`);
            }
