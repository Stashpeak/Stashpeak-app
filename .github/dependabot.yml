version: 2
updates:
  # JS dependencies (root package.json). Grouped so updates land as a couple of
  # reviewable PRs instead of one per package; production deps stay separate from
  # dev deps so a runtime change still gets its own PR. The "chore" commit prefix
  # keeps Dependabot's PR titles Conventional-Commit shaped so the pr-title check
  # passes for them.
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore"
      include: "scope"
    groups:
      production-dependencies:
        dependency-type: "production"
      development-dependencies:
        dependency-type: "development"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore"
      include: "scope"
    groups:
      github-actions:
        patterns:
          - "*"

  # The Rust crate lives in /src-tauri (where Cargo.toml is). Net-new vs the
  # sibling SimLauncher repo, which has no Rust.
  - package-ecosystem: "cargo"
    directory: "/src-tauri"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore"
      include: "scope"
    groups:
      # Cargo doesn't support the dependency-type group matcher (npm/pip/etc.
      # only), so bundle all crate updates into one grouped PR.
      cargo:
        patterns:
          - "*"
